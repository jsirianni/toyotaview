{{ define "title" }}Sign in{{ end }}
{{ define "login" }}
{{ template "base" . }}
{{ end }}
{{ define "content" }}
<section class="hero auth-panel">
  <h1>Sign in</h1>
  <p>Use your ToyotaView username and password to open the vehicle dashboard.</p>
</section>

<section class="panel auth-panel">
  {{ if .Error }}
  <div class="banner">{{ .Error }}</div>
  {{ end }}

  <form method="post" action="/login">
    <div class="field">
      <label for="username">Username</label>
      <input id="username" name="username" value="{{ .Username }}" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <div class="actions">
      <button type="submit">Sign in</button>
      <a class="button secondary" href="/signup">Create account</a>
    </div>
  </form>
</section>
{{ end }}
